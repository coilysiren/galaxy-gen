name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # rust
      - run: cargo build
      - run: cargo check
      - run: cargo test

      # wasm
      - run: cargo install wasm-pack
      - name: Install binaryen (pinned release)
        # Ubuntu's apt binaryen produces WASM that trips
        # `WebAssembly.Table.grow(): failed to grow table by 4` in
        # chromium. Pin to an upstream release binary.
        run: |
          VER=version_119
          curl -sSL "https://github.com/WebAssembly/binaryen/releases/download/${VER}/binaryen-${VER}-x86_64-linux.tar.gz" -o /tmp/binaryen.tgz
          sudo tar -xzf /tmp/binaryen.tgz -C /usr/local --strip-components=1
          wasm-opt --version
      - run: wasm-pack build
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      # wasm
      - run: cargo install wasm-pack
      - name: Install binaryen (pinned release)
        # Ubuntu's apt binaryen produces WASM that trips
        # `WebAssembly.Table.grow(): failed to grow table by 4` in
        # chromium. Pin to an upstream release binary.
        run: |
          VER=version_119
          curl -sSL "https://github.com/WebAssembly/binaryen/releases/download/${VER}/binaryen-${VER}-x86_64-linux.tar.gz" -o /tmp/binaryen.tgz
          sudo tar -xzf /tmp/binaryen.tgz -C /usr/local --strip-components=1
          wasm-opt --version
      - run: wasm-pack build

      # js
      - run: npm ci
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [rust, js]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - run: cargo install wasm-pack
      - name: Install binaryen (pinned release)
        # Ubuntu's apt binaryen produces WASM that trips
        # `WebAssembly.Table.grow(): failed to grow table by 4` in
        # chromium. Pin to an upstream release binary.
        run: |
          VER=version_119
          curl -sSL "https://github.com/WebAssembly/binaryen/releases/download/${VER}/binaryen-${VER}-x86_64-linux.tar.gz" -o /tmp/binaryen.tgz
          sudo tar -xzf /tmp/binaryen.tgz -C /usr/local --strip-components=1
          wasm-opt --version
      - run: wasm-pack build

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
