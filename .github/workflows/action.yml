name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust
      - run: cargo build
      - run: cargo check
      - run: cargo test

      # wasm
      - run: cargo install wasm-pack
      - run: sudo apt-get update && sudo apt-get install -y binaryen
      - run: wasm-pack build
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      # wasm
      - run: cargo install wasm-pack
      - run: sudo apt-get update && sudo apt-get install -y binaryen
      - run: wasm-pack build

      # js
      - run: npm ci
