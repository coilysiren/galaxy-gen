name: build-publish-deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: cargo install wasm-pack
      - name: Install binaryen (pinned release)
        # Ubuntu's apt binaryen produces WASM that trips
        # `WebAssembly.Table.grow(): failed to grow table by 4` in
        # chromium. Pin to an upstream release binary.
        run: |
          VER=version_119
          curl -sSL "https://github.com/WebAssembly/binaryen/releases/download/${VER}/binaryen-${VER}-x86_64-linux.tar.gz" -o /tmp/binaryen.tgz
          sudo tar -xzf /tmp/binaryen.tgz -C /usr/local --strip-components=1
          wasm-opt --version
      - run: wasm-pack build
      - run: cargo test
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Playwright E2E
        env:
          CI: "true"
        run: npx playwright test
      - run: npx tsc --noEmit
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  build-publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        run: name=coilysiren-galaxy-gen make .build-docker
      - name: Tag and push
        env:
          IMAGE_URL: ghcr.io/${{ github.repository }}/coilysiren-galaxy-gen:${{ github.sha }}
        run: |
          docker tag coilysiren-galaxy-gen:latest "$IMAGE_URL"
          docker push "$IMAGE_URL"

  deploy:
    runs-on: ubuntu-latest
    needs: build-publish
    steps:
      - uses: actions/checkout@v4
      # The action auths with an ephemeral authkey and brings tailscale up.
      # A second `sudo tailscale up` to advertise flags would try to reauth
      # without a key and hang; push the flags into the action's inputs
      # instead. Hostname is per-run to avoid machine-key collisions.
      - uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          args: --accept-dns --accept-routes
          hostname: github-actions-${{ github.run_id }}
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
      - name: Materialize kubeconfig
        # The `K8S_SERVER` secret points at a tailnet hostname
        # (`https://kai-server:6443`) that resolves only via Tailscale
        # MagicDNS. The runner's systemd-resolved occasionally returns
        # "server misbehaving" for it. Resolve it via `tailscale ip`
        # up front and swap in the IP, keeping `tls-server-name` so
        # cert verification still matches the hostname in the cert.
        env:
          K8S_SERVER: ${{ secrets.K8S_SERVER }}
          K8S_CA_DATA: ${{ secrets.K8S_CA_DATA }}
          K8S_CLIENT_CERT_DATA: ${{ secrets.K8S_CLIENT_CERT_DATA }}
          K8S_CLIENT_KEY_DATA: ${{ secrets.K8S_CLIENT_KEY_DATA }}
        run: |
          set -e
          # Extract host + port from the server URL.
          hostport=${K8S_SERVER#https://}
          host=${hostport%%:*}
          port=${hostport##*:}
          # If host is already an IP, use as-is; otherwise resolve via
          # tailscale.
          if [[ "$host" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            ip="$host"
            tls_name=""
          else
            ip=$(tailscale ip -4 "$host" | head -1)
            if [[ -z "$ip" ]]; then
              echo "tailscale ip lookup for $host returned empty" >&2
              tailscale status >&2 || true
              exit 1
            fi
            tls_name="$host"
          fi
          echo "resolved $host -> $ip (tls-server-name=${tls_name:-<none>})"

          mkdir -p ~/.kube
          {
            echo "apiVersion: v1"
            echo "kind: Config"
            echo "clusters:"
            echo "- name: default"
            echo "  cluster:"
            echo "    server: https://${ip}:${port}"
            if [[ -n "$tls_name" ]]; then
              echo "    tls-server-name: ${tls_name}"
            fi
            echo "    certificate-authority-data: ${K8S_CA_DATA}"
            echo "contexts:"
            echo "- name: default"
            echo "  context:"
            echo "    cluster: default"
            echo "    user: default"
            echo "current-context: default"
            echo "preferences: {}"
            echo "users:"
            echo "- name: default"
            echo "  user:"
            echo "    client-certificate-data: ${K8S_CLIENT_CERT_DATA}"
            echo "    client-key-data: ${K8S_CLIENT_KEY_DATA}"
          } > ~/.kube/config
      - name: Install envsubst and yq
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base
          sudo curl -L https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
      - name: Apply manifests
        env:
          IMAGE_URL: ghcr.io/${{ github.repository }}/coilysiren-galaxy-gen:${{ github.sha }}
        # Pass as a make-level override, not a shell env prefix — bash
        # rejects `image-url=…` as an assignment because `-` isn't a
        # valid bash variable-name character, and tries to exec it as a
        # command instead.
        run: make .deploy image-url="$IMAGE_URL"
      - name: Wait for rollout
        run: kubectl -n coilysiren-galaxy-gen rollout status deploy/coilysiren-galaxy-gen-app --timeout=5m
