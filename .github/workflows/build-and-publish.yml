name: build-publish-deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: cargo install wasm-pack
      - name: Install binaryen (pinned release)
        # Ubuntu's apt binaryen produces WASM that trips
        # `WebAssembly.Table.grow(): failed to grow table by 4` in
        # chromium. Pin to an upstream release binary.
        run: |
          VER=version_119
          curl -sSL "https://github.com/WebAssembly/binaryen/releases/download/${VER}/binaryen-${VER}-x86_64-linux.tar.gz" -o /tmp/binaryen.tgz
          sudo tar -xzf /tmp/binaryen.tgz -C /usr/local --strip-components=1
          wasm-opt --version
      - run: wasm-pack build
      - run: cargo test
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Playwright E2E
        env:
          CI: "true"
        run: npx playwright test
      - run: npx tsc --noEmit
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  build-publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: name=coilysiren-galaxy-gen make .build-docker
      - run: docker tag coilysiren-galaxy-gen:latest ghcr.io/${{ github.repository }}/coilysiren-galaxy-gen:${{ github.sha }}
      - run: docker push ghcr.io/${{ github.repository }}/coilysiren-galaxy-gen:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-publish
    steps:
      - uses: actions/checkout@v6
      # The action auths with an ephemeral authkey and brings tailscale up.
      # A second `sudo tailscale up` to advertise flags would try to reauth
      # without a key and hang; push the flags into the action's inputs
      # instead. Hostname is per-run to avoid machine-key collisions.
      - uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          args: --accept-dns --accept-routes
          hostname: github-actions-${{ github.run_id }}
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
      - name: kubeconfig
        # NOTE: K8S_SERVER must be the tailnet IP literal (not MagicDNS).
        # Matches coilysiren/eco-spec-tracker and coilysiren/backend exactly.
        run: |
          mkdir -p ~/.kube
          cat <<EOF > ~/.kube/config
          apiVersion: v1
          kind: Config
          clusters:
          - name: default
            cluster:
              server: ${{ secrets.K8S_SERVER }}
              certificate-authority-data: ${{ secrets.K8S_CA_DATA }}
          contexts:
          - name: default
            context:
              cluster: default
              user: default
          current-context: default
          preferences: {}
          users:
          - name: default
            user:
              client-certificate-data: ${{ secrets.K8S_CLIENT_CERT_DATA }}
              client-key-data: ${{ secrets.K8S_CLIENT_KEY_DATA }}
          EOF
      - run: make .deploy
