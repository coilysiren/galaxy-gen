name: TruffleHog

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly full rescan
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: TruffleHog (filesystem, offline)
        run: |
          cat > /tmp/trufflehog-exclude <<'EOF'
          ^\.git/
          ^\.venv/
          ^venv/
          ^node_modules/
          ^__pycache__/
          ^\.mypy_cache/
          ^\.pytest_cache/
          ^\.ruff_cache/
          EOF
          docker run --rm \
            -v "${{ github.workspace }}:/pwd:ro" \
            -v /tmp/trufflehog-exclude:/exclude:ro \
            trufflesecurity/trufflehog:latest \
            filesystem /pwd \
            --no-verification --no-update --fail \
            --exclude-paths=/exclude
